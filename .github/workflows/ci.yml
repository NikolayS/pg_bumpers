name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust (fmt - clippy - build - test - deny)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.90.0 (rustfmt + clippy)
        uses: dtolnay/rust-toolchain@1.90.0
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: build
        run: cargo build --workspace --locked

      - name: test
        run: cargo test --workspace --locked

      - name: cargo-deny (licenses - bans - advisories - sources)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  mcp:
    name: MCP server (build - test - license-check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp/server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: mcp/server/pnpm-lock.yaml

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build (tsc --noEmit)
        run: pnpm run build

      - name: Test (vitest)
        run: pnpm test

      - name: License check (Apache/MIT/BSD/ISC only; ban GPL/AGPL)
        run: pnpm run license-check
