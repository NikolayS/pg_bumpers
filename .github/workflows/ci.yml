name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes (esp. on PR pushes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the fast gates need only to read the repo.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # The FAST gate — fmt - clippy -D warnings - build --locked - test --locked -
  # cargo-deny. Kept deliberately lean; fuzz/coverage/matrix/docs live in the
  # separate ci-extra.yml workflow so this stays the quick merge signal.
  rust:
    name: Rust (fmt - clippy - build - test - deny)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Install Rust 1.90.0 (rustfmt + clippy)
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1

      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: build
        run: cargo build --workspace --locked

      - name: test
        run: cargo test --workspace --locked

      - name: cargo-deny (licenses - bans - advisories - sources)
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check

      # local-stack.sh PATH/PID guard unit tests (issue #16). Pure path/PID logic —
      # NO PostgreSQL required and nothing real is ever started or killed — so it runs in
      # this FAST gate (not the integration matrix job). bash -n first as a syntax gate.
      # No untrusted GitHub-event input is used; both commands are static.
      - name: deploy guard tests — local-stack.sh validate_root / pid_is_ours
        run: |
          bash -n deploy/local-stack.sh
          bash deploy/test/local_stack_guards.sh

      # Rust-only grep-acceptance gate (issue #101, spec v0.8.1 §0.5): no banned
      # non-Rust scripting/typed-compiler/package-manager technology tokens in the
      # tracked source/docs/CI/toolchain (the gate's own token list lives in the
      # script). Pure `git grep` over tracked files — NO PostgreSQL required — so it
      # runs in this FAST gate. Also syntax-checks deploy/up.sh (it now mints the
      # approver keypair via `pgb-cli keygen`). Both commands are static (no event input).
      - name: rust-only gate — no non-Rust toolchain residuals
        run: |
          bash -n deploy/up.sh
          bash deploy/test/no_node_residuals.sh

  # NOTE: the deployable MCP server is the native Rust `pgb-mcp` (crate
  # `crates/mcp`), which is a workspace member — the `rust` job above already
  # builds + tests it (`cargo {build,test} --workspace`), and `cargo deny`
  # license-checks its deps. The dedicated job for the original non-Rust MCP
  # server was removed with that tree in EPIC #83; no replacement step is needed.

  # ===========================================================================
  # THE SAFETY INTEGRATION MATRIX (issues #44, #102) — runs the REAL
  # deterministic-floor ITs against a REAL PostgreSQL on EVERY push/PR, across
  # the FULL supported range PG 14·15·16·17·18 (spec v0.8.1 §0.5: "Supported
  # PostgreSQL: 14, 15, 16, 17, 18 … do NOT pin to 18 … the wire proxy + role
  # wall are version-agnostic; CI matrix tests against this range"). These tests
  # are env-gated behind PG_BUMPERS_IT=1 and need a live PG, so the fast `rust`
  # job above (which NEVER sets PG_BUMPERS_IT) skips them. A regression that
  # breaks the moat — OR a version-pin that breaks an older major — would
  # otherwise leave CI green; this matrix is the backstop on EVERY supported PG.
  #
  # ⚠️ Throwaway clusters ONLY, on dedicated HIGH ports (54321/54341/54355/
  # 55431/55432/543xx). NEVER :5432.
  #
  # Substrate strategy (avoids the #18 cross-crate scratch-collision flakes):
  #   • SELF-PROVISIONING ITs (warden, dbsafe-bench gate, clone-governance, the
  #     MCP write-path) initdb their OWN clusters — run each as its OWN cargo
  #     invocation with --test-threads=1 (clone-governance + write-path both
  #     default to :54360, so they MUST NOT run concurrently).
  #   • STACK-BACKED ITs connect to a pre-provisioned admin server on a fixed
  #     port (each test makes its own DB): deploy/ci/start-pg.sh brings those up.
  #   • PROXY / READ-PATH ITs need the native-role WALL → deploy/local-stack.sh.
  # ===========================================================================
  integration:
    name: Integration (PG ${{ matrix.pg }} — the safety ITs)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      # Don't let one major's failure cancel the others — we want to SEE which
      # majors pass/fail in a single run.
      fail-fast: false
      matrix:
        # The full supported range — every safety IT runs against each major
        # (spec v0.8.1 §0.5; issue #102). matrix.pg is a static, trusted list
        # (never untrusted event input), so interpolating it into run: is safe.
        pg: [14, 15, 16, 17, 18]
    env:
      # The ONE cross-IT/CI PG bin-dir variable (issues #44, #102). PGDG installs
      # PostgreSQL ${{ matrix.pg }} here on Ubuntu; every IT resolver honors this
      # first. Renamed from PG_BUMPERS_PG18_BIN (hard rename, no alias) now that
      # the substrate is version-agnostic across the supported range.
      PG_BUMPERS_PG_BIN: /usr/lib/postgresql/${{ matrix.pg }}/bin
      # The major as an env var so run: steps never interpolate ${{ … }} into a
      # shell command (defense-in-depth against workflow injection, even though
      # matrix.pg is a trusted literal).
      PG_MAJOR: ${{ matrix.pg }}
      PG_BUMPERS_IT: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Install PostgreSQL from the PGDG apt repo
        run: |
          set -Eeuo pipefail
          # The official apt.postgresql.org setup, pinned reproducibly. The
          # ubuntu runner ships its own libpq/clients — purge first so the only
          # PG on PATH is PGDG's ${PG_MAJOR}.
          sudo systemctl stop postgresql || true
          sudo apt-get purge -y 'postgresql-*' || true
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          # FAIL CLOSED: pin the PGDG signing-key fingerprint before it ever
          # enters the apt keyring. A substituted key (MITM / compromised mirror)
          # has a different fingerprint, so this aborts the whole install instead
          # of trusting an attacker's repo (issue #44 review, FIX 3).
          PGDG_KEY_FPR=B97B0AFCAA1A47F044F244A07FCC7D46ACCC4CF8
          got_fpr=$(gpg --show-keys --with-colons --with-fingerprint \
            /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            | awk -F: '$1 == "fpr" { print $10; exit }')
          if [ "$got_fpr" != "$PGDG_KEY_FPR" ]; then
            echo "PGDG signing-key fingerprint mismatch: got '${got_fpr}', expected '${PGDG_KEY_FPR}' — aborting (fail closed)" >&2
            exit 1
          fi
          echo "PGDG signing-key fingerprint verified: ${got_fpr}"
          # shellcheck disable=SC1091
          . /etc/os-release
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            "postgresql-${PG_MAJOR}" "postgresql-client-${PG_MAJOR}"
          # Verify the bin dir + the exact tools every IT needs are present.
          ls -l "$PG_BUMPERS_PG_BIN"
          for t in initdb pg_ctl pg_basebackup psql pg_isready; do
            test -x "$PG_BUMPERS_PG_BIN/$t" || { echo "missing $t in $PG_BUMPERS_PG_BIN" >&2; exit 1; }
          done
          "$PG_BUMPERS_PG_BIN/initdb" --version
          # PGDG auto-starts a default cluster on :5432 owned by the `postgres`
          # OS user — stop it so nothing of ours can ever collide with it. (Our
          # ITs use high ports only; this is belt + suspenders.)
          sudo pg_ctlcluster "${PG_MAJOR}" main stop || true

      - name: Install Rust 1.90.0
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: 1.90.0

      - name: Cache cargo build
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1
        with:
          # Per-major cache slot so the 5 matrix legs don't race to write the
          # same key (the Rust build itself is PG-version-independent).
          key: integration-pg${{ matrix.pg }}

      - name: Build the workspace (test + bins the ITs drive)
        run: cargo build --workspace --locked

      # ---- SELF-PROVISIONING ITs (each initdb's its own throwaway cluster) ----
      # Distinct cargo invocations + --test-threads=1 so the clone-governance and
      # write-path ITs (both default to :54360) can never run concurrently.

      - name: IT — native-role warden runaway-kill (warden_it)
        run: cargo test -p pgb-warden --test warden_it --locked -- --nocapture --test-threads=1

      # The BYO preflight (issue #103): proves `pgb-cli doctor` exits 0 against a
      # hardened cluster and FAIL-CLOSED (non-zero) against an un-hardened (SUPERUSER)
      # agent role. Self-provisioning (initdb's its own throwaway cluster on :54363).
      - name: IT — pgb-cli doctor BYO preflight (fail-closed vs hardened)
        run: cargo test -p pgb-cli --test doctor_it --locked -- --nocapture --test-threads=1

      - name: IT — dbsafe-bench gate has teeth (gate_it, direct-to-DB WALL bypass)
        run: cargo test -p dbsafe-bench --test gate_it --locked -- --nocapture --test-threads=1

      - name: IT — clone-orchestrator governance (dry_run clone + guarded apply + SIGKILL teardown)
        run: cargo test -p pgb-clone-orchestrator --test clone_governance_it --locked -- --nocapture --test-threads=1

      - name: IT — MCP write-path e2e (mcp -> applyd socket -> guarded_apply -> the live backend)
        run: cargo test -p pgb-mcp --test write_path_e2e --locked -- --nocapture --test-threads=1

      # ---- STACK-BACKED ITs (connect to a pre-provisioned admin server) ----
      # Each group brings up its own throwaway admin cluster on its default port,
      # runs, then tears it down. Distinct ports -> groups don't interfere.

      - name: IT — clone-orchestrator dry_run + apply + revert + apply_grant (:54341)
        run: |
          set -Eeuo pipefail
          deploy/ci/start-pg.sh 54341
          trap 'deploy/ci/stop-pg.sh 54341' EXIT
          cargo test -p pgb-clone-orchestrator --locked \
            --test dry_run_it --test apply_it --test revert_it --test apply_grant_it \
            -- --nocapture --test-threads=1

      - name: IT — applyd guarded-apply + revert + socket wire (:54355)
        run: |
          set -Eeuo pipefail
          deploy/ci/start-pg.sh 54355
          trap 'deploy/ci/stop-pg.sh 54355' EXIT
          PG_BUMPERS_PGURL="host=127.0.0.1 port=54355 user=postgres dbname=postgres" \
            cargo test -p pgb-applyd --test applyd_it --locked -- --nocapture --test-threads=1

      - name: IT — audit _meta sink/tamper/chain + proxy audit-_meta + cli shared-_meta (:55432)
        env:
          PG_BUMPERS_AUDIT_PGURL: host=127.0.0.1 port=55432 user=postgres dbname=postgres
        run: |
          set -Eeuo pipefail
          deploy/ci/start-pg.sh 55432
          trap 'deploy/ci/stop-pg.sh 55432' EXIT
          cargo test -p pgb-audit --locked \
            --test pg_meta_it --test concurrent_append_it --test single_anchor_owner_it \
            -- --nocapture --test-threads=1
          # The proxy S5 _meta-chain IT also targets the audit admin server.
          cargo test -p pgb-proxy --test audit_meta_it --locked -- --nocapture --test-threads=1
          cargo test -p pgb-cli --test shared_meta_it --locked -- --nocapture --test-threads=1

      - name: IT — fidelity gate (clone<->prod prediction + typed-inverse restore) (:55431)
        run: |
          set -Eeuo pipefail
          deploy/ci/start-pg.sh 55431
          trap 'deploy/ci/stop-pg.sh 55431' EXIT
          PG_BUMPERS_PGURL="host=127.0.0.1 port=55431 user=postgres dbname=postgres" \
            cargo test -p fidelity-spike --locked -- --nocapture --test-threads=1

      # ---- PROXY / READ-PATH ITs — need the native-role WALL (local-stack) ----

      - name: Bring up the local-stack (primary :54321 WALL role + meta :54323 + replica :54322)
        run: deploy/local-stack.sh up

      - name: IT — proxy marquee/cutoff/TLS + read-gates against the WALL primary
        run: |
          set -Eeuo pipefail
          cargo test -p pgb-proxy --locked \
            --test proxy_it --test readgates_it \
            -- --nocapture --test-threads=1

      - name: IT — MCP read-path e2e THROUGH the live proxy (TLS+SCRAM, WALL deny)
        run: cargo test -p pgb-mcp --test read_path_e2e --locked -- --nocapture --test-threads=1

      - name: Safety script — role-hardening WALL matrix (its own cluster)
        run: deploy/test/wall_matrix.sh

      - name: Safety script — local-stack integration smoke (primary/meta/replica + streaming)
        run: deploy/smoke.sh

      - name: Tear down the local-stack
        if: always()
        run: deploy/local-stack.sh down || true
