# pg_bumpers — example policy.yaml  (SPEC §10.10, §12.2, §15.1)
#
# The single source of per-role policy: the SELECT whitelist, byte/row budgets
# (single-shot + per-window cumulative), the advisory EXPLAIN-cost/row ceiling,
# and the autonomy level (L0–L2 in the MVP). Plus the §12.2 component config
# (replica / clone / pitr), the §14.3 approver-set placeholder (CLI signing key),
# and the §10.9 audit anchor.
#
# Validation (see `PolicyConfig::validate`) rejects:
#   * an autonomy level above L2 (L3+ is out of MVP scope),
#   * any zero / negative budget (incl. a zero/negative/NaN max_plan_cost or a
#     zero max_plan_rows EXPLAIN ceiling),
#   * a per-window cumulative cap below the single-shot cap.
#
# This file loads and validates in the crate's test-suite.

version: 1

roles:
  # An application write role: human-in-the-loop (L1), tight budgets, may read
  # only its own tables.
  app_writer:
    select_whitelist:
      - public.orders
      - public.order_items
    budget:
      max_bytes: 1048576        # 1 MiB single-shot
      max_rows: 10000           # 10k rows single-shot
      max_plan_cost: 50000.0    # EXPLAIN-cost ceiling (advisory pre-flight gate)
      max_plan_rows: 1000000    # EXPLAIN row ceiling (advisory; independent of the cutoff)
      per_window:
        window_secs: 60         # rolling 60s window
        max_bytes: 10485760     # 10 MiB cumulative / window
        max_rows: 100000        # 100k rows cumulative / window
    autonomy: L1

  # An analytics role: bigger reads, broader whitelist, bounded autonomy (L2)
  # so routine certified reads run without a human in the loop.
  analytics:
    select_whitelist:
      - public.orders
      - public.order_items
      - public.customers
      - analytics.daily_rollup
    budget:
      max_bytes: 268435456      # 256 MiB single-shot
      max_rows: 5000000         # 5M rows single-shot
      max_plan_cost: 100000000.0 # EXPLAIN-cost ceiling (large for analytics reads)
      max_plan_rows: 100000000  # EXPLAIN row ceiling (large for analytics reads)
      per_window:
        window_secs: 300        # rolling 5m window
        max_bytes: 1073741824   # 1 GiB cumulative / window
        max_rows: 50000000      # 50M rows cumulative / window
    autonomy: L2

  # A locked-down migration role: no autonomy (L0) — every action needs human
  # approval; reads nothing by default.
  migration:
    select_whitelist: []
    budget:
      max_bytes: 1048576
      max_rows: 10000
      max_plan_cost: 10000.0    # tight EXPLAIN ceiling for the locked-down role
      max_plan_rows: 100000     # tight EXPLAIN row ceiling for the locked-down role
      per_window:
        window_secs: 60
        max_bytes: 10485760
        max_rows: 100000
    autonomy: L0

# =====================================================================================
# §0.5 — BRING-YOUR-OWN POSTGRES: the three DSN targets (the first-user experience).
# =====================================================================================
# pg_bumpers points at YOUR existing PostgreSQL 14-18. policy.yaml is AUTHORITATIVE for
# the connection TARGETS — host/port/database/role of (1) your primary, (2) an optional
# read replica, and (3) the audit/`_meta` location. The `PGB_BACKEND_*` / `PGB_PROXY_*` /
# `PGB_META_DSN` env vars are OVERRIDES layered on top (precedence: env override >
# policy.yaml target > FAIL-CLOSED — there is NO throwaway-cluster default).
#
# CREDENTIALS STAY OUT OF THIS FILE. A target is CREDENTIAL-LESS (host/port/db/role +
# an optional `secret_ref`). In THIS version the literal password resolves from the
# CONVENTIONAL ENV VAR at connect time (PGB_BACKEND_PASSWORD for the primary/applyd,
# PGB_META_PASSWORD for `_meta`, PGB_DOCTOR_PASSWORD for the doctor) — the daemons do
# NOT resolve `secret_ref` from any secret store yet. `secret_ref` is a FORWARD-
# COMPATIBILITY PLACEHOLDER (parsed + kept credential-less so a future release can wire a
# resolver without a schema change); today it is documentation only and the env var is
# REQUIRED. This matches the existing "no literal passwords in files" posture.
#
# VALIDATION (fail-closed, SPEC §0.5): each target's host/database/role/secret_ref is
# rejected on load if it carries whitespace, `=`, a quote, a backslash, or a control char
# (those would inject extra libpq DSN keywords — e.g. a TLS-disabling `sslmode=disable`).
#
# Uncomment + edit the three targets below to point at your database, then run
# `pgb-cli doctor` to verify the connection + WALL hardening.
#
# primary — the WALL/agent + applier connection target (proxy + applyd connect here):
# primary:
#   host: db.internal
#   port: 5432
#   database: app
#   role: pgb_agent            # the hardened WALL role (apply deploy/sql/10_hardened_role.sql)
#   secret_ref: "kms://pg-bumpers/primary-pw/v1"   # OPTIONAL forward-compat placeholder; NOT
#                                                  # resolved yet — password from PGB_BACKEND_PASSWORD

# §12.2 — optional read replica (runtime-detected; never silently downgraded). Either the
# legacy `dsn` string OR the typed BYO `target` (credential-less) may be set.
replica:
  dsn: "postgresql://reader@replica.internal:5432/app"
  # target:                    # the BYO-first typed form (credential-less)
  #   host: replica.internal
  #   port: 5432
  #   database: app
  #   role: pgb_agent

clone:
  provider: dblab            # none | dblab

pitr:
  enabled: true

# §14.3 — MVP approval mechanism: a CLI-held signing key. The public key is
# resolved out-of-band (KMS / keyring, §10.9); this is just the reference id.
approvers:
  cli_signing_key_id: "kms://pg-bumpers/approval-key/v1"

# §0.5 / §10.9 — the audit chain. Two DISTINCT things live here:
#   * `target` — the credential-less `_meta` DSN LOCATION (where the hash-chained audit
#     chain lives; commonly co-located on the primary, or a separate audit DB). BYO.
#   * `anchor_endpoint` — the external append-only / WORM anchor that pins the chain HEAD
#     (object-lock / transparency log; NOT a Postgres DSN). Wired in S4.
audit:
  # target:                    # the BYO `_meta` DSN location (credential-less)
  #   host: db.internal
  #   port: 5432
  #   database: app_meta
  #   role: pgb_audit_writer
  #   secret_ref: "kms://pg-bumpers/meta-pw/v1"   # forward-compat placeholder; NOT resolved yet —
  #                                               # the `_meta` password comes from PGB_META_PASSWORD
  anchor_endpoint: "https://audit-anchor.internal/v1/append"

# §4 "Warden", §10.10 — the live out-of-band watchdog's operational thresholds.
#
# HOW WARDEN READS THIS: the warden parses ITS OWN `warden:` section out of this same
# policy.yaml (crates/warden/src/thresholds.rs `WardenThresholds::from_policy_yaml`,
# loaded fail-closed at startup by `load_thresholds_fail_closed`). It is parsed
# SEPARATELY from `PolicyConfig` (which owns the role model above) so the warden owns
# its own knobs without widening the policy crate's schema — the two share ONE file
# without coupling their types. A MISSING `warden:` section is NOT an un-guarded warden:
# the warden falls back to the conservative built-in `WardenThresholds::default()`
# (the exact values shown below). A PRESENT-but-invalid section (any value that would
# DISABLE a guard — a 0ms busy-loop poll, a multi-hour poll, a zero ceiling, a zero
# trip-count/cooldown) is REJECTED and the warden refuses to start (fail-closed).
#
# The values below are the shipped defaults, made explicit so a deployment can SEE and
# tune what the warden enforces rather than relying on invisible hardcoded numbers.
warden:
  poll_interval_millis: 2000              # poll cadence (SPEC §4: 1–5s). Bounds: (0, 1h].
  max_query_runtime_millis: 60000         # kill an AGENT-tagged backend past this (runaway).
  slot_retained_wal_alarm_bytes: 67108864 # 64 MiB: alarm when a replication slot retains more.
  breaker_lag_trip_bytes: 134217728       # 128 MiB: trip the breaker on replication lag past this.
  breaker_runaway_trip_count: 3           # trip when this many concurrent agent runaways are seen.
  breaker_cooldown_millis: 30000          # how long the breaker stays OPEN before probing recovery.
